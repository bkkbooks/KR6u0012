body:
  text: 鎘銅灌作柱象作屋椽虎珀作屋𣖷真珠作羅網星宿作鵲頭日月作繚窗可得萬萬九千年上有一小劫下有一由旬此經雖小大有威神亦等法華亦等涅槃亦朦雜經譬如東海喻如太山入海取寶隨其多少亦得重來入山取材任材長短亦得重來誰能抄此經手中螺文成誰能看此經眼中重光生誰能誦此經歷劫大聰明觀世音造金大罪得除小罪得滅欲向刀山刀山摧折欲向劍樹劍樹自缺欲向爐炭爐炭自滅欲向罐湯罐湯自冷倉倉靈音聲朗朗講堂中央琉璃作地白銀為譬前登金床後仚王凡手把金經至佛說言憶佛如憶食念佛如念命一日誦五遍除罪一千五百萬劫皆釋成佛道
